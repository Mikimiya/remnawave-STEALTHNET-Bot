<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="coreGradient" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#3bc9db" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <g transform="translate(10, 10)">
    <circle cx="35" cy="50" r="14" fill="url(#coreGradient)" filter="url(#glow)"/>
    <circle cx="32" cy="47" r="5" fill="#ffffff" opacity="0.4"/>
    <path d="M 65 20 A 35 35 0 0 1 65 80" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
  </g>
</svg>