<svg width="360" height="120" viewBox="0 0 360 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    @font-face {
      font-family: 'Orbitron';
      font-weight: 700;
      src: url(data:font/woff2;base64,) format('woff2');
    }
    @font-face {
      font-family: 'Orbitron';
      font-weight: 400;
      src: url(data:font/woff2;base64,) format('woff2');
    }
  </style>
  <defs>
    <radialGradient id="coreGradient" cx="35%" cy="35%">
      <stop offset="0%" stop-color="#3bc9db" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3bc9db" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c8e6f0" />
      <stop offset="50%" stop-color="#4db8cc" />
      <stop offset="100%" stop-color="#1a8fa8" />
    </linearGradient>
    <!-- 切割遮罩：上半+下半，中间留3px透明缝隙 -->
    <clipPath id="sliceMask">
      <rect x="-20" y="-50" width="400" height="48.5"/>
      <rect x="-20" y="1.5" width="400" height="70"/>
    </clipPath>
  </defs>

  <!-- Text -->
  <g transform="translate(16, 48)" clip-path="url(#sliceMask)">
    <text x="0" y="0" font-family="Orbitron, sans-serif" font-size="72" font-weight="700" letter-spacing="-1" fill="url(#textGradient)" dominant-baseline="middle">Coolgo</text>
  </g>
  <g transform="translate(16, 48)">
    <text x="6" y="44" font-family="Orbitron, sans-serif" font-size="16" font-weight="400" letter-spacing="6" fill="#ffffff" opacity="0.75">NETWORK</text>
    <rect x="0" y="58" width="338" height="2.5" fill="url(#underline)" opacity="0.6" rx="1.2"/>
  </g>
</svg>