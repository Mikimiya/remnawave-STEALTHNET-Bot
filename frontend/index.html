<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/svg+xml" href="/favicon-white.svg" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="preconnect" href="https://fonts.loli.net" />
    <link rel="preconnect" href="https://gstatic.loli.net" crossorigin />
    <link
      href="https://fonts.loli.net/css2?family=Inter:wght@400;500;600;700&display=swap&subset=latin,cyrillic"
      rel="stylesheet"
    />
    <title>Coolgo</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Если старый Service Worker перехватил запрос к /api/ и вернул SPA —
      // удаляем SW и перезагружаем, чтобы запрос ушёл на бэкенд.
      if (location.pathname.startsWith('/api/')) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            var p = [];
            regs.forEach(function(r) { p.push(r.unregister()); });
            Promise.all(p).then(function() { location.reload(); });
          });
        } else {
          location.reload();
        }
      }
    </script>
    <script>
      // 仅在 Telegram 内嵌环境中加载 Telegram Web App SDK
      if (window.TelegramWebviewProxy || navigator.userAgent.includes('Telegram') || location.hash.includes('tgWebAppData')) {
        var s = document.createElement('script');
        s.src = '/telegram-web-app.js';
        document.head.appendChild(s);
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
